[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "chimera-report"
version = "1.0.0"
description = "Reporting & Visualization plugin for Chimera Intel."
requires-python = ">=3.9"
dependencies = [
    "reportlab>=4.0.4,<5.0.0",
    "pyvis>=0.3.2,<0.4.0",
]

# This section registers the package as a Chimera Intel plugin
[project.entry-points."chimera_intel.plugins"]
report = "chimera_report.main:ReportPlugin"