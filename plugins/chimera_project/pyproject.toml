[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "chimera-intel"
version = "6.0.0"
authors = [
    { name = "Ignacio Iliev", email = "ignasioi72@gmail.com" },
]
description = "A modular OSINT platform for corporate intelligence and counter-intelligence, powered by an AI analysis core."
readme = "README.md"
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: Security",
    "Topic :: Utilities",
]

# Core dependencies required for the framework to run
dependencies = [
    "typer[all]>=0.9.0,<0.10.0",
    "python-dotenv>=1.0.0,<2.0.0",
    "beautifulsoup4>=4.12.2,<5.0.0",
    "httpx>=0.24.1,<0.25.0",
    "PyYAML>=6.0.1,<7.0.0",
    "fastapi>=0.103.1,<0.104.0",
    "uvicorn[standard]>=0.23.2,<0.24.0",
    "jinja2>=3.1.2,<4.0.0",
    "pydantic>=2.4.2,<3.0.0",
    "pydantic-settings>=2.0.3,<3.0.0",
    "rich>=13.0.0,<14.0.0", # Added for console output
    "lxml>=5.2.2,<6.0.0",
    "stix2>=3.0.1,<4.0.0", # Added for STIX 2.1 support
    # Associated types for core libraries
    "types-PyYAML>=6.0.12.12,<7.0.0.0",
    "types-beautifulsoup4>=4.12.0.20250516,<4.13.0.0",
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "ruff",
    "black",
    "mypy"
]

# This is the entry point that creates the 'chimera' command
[project.scripts]
chimera = "chimera_intel.cli:app"

[project.urls]
"Homepage" = "https://github.com/IgnacioIliev/chimera-intel"
"Bug Tracker" = "https://github.com/IgnacioIliev/chimera-intel/issues"